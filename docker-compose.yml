version: '3.8'

services:
  # Aplicación LabToDo
  labtodo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labtodo-app
    restart: unless-stopped
    ports:
      # Map host port (HOST_PORT, default 8081) to container port 8080
      - "${HOST_PORT:-8081}:8080"
    environment:
      # Las variables se cargan automáticamente desde .env
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CREATE_IF_NOT_EXISTS: ${DB_CREATE_IF_NOT_EXISTS}
      # Force the server inside the container to listen on 8080
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}